apiVersion: v1
kind: Service
metadata:
  name: gitlab-service
  namespace: gitlab
spec:
  selector:
    app: gitlab
  type: ClusterIP
  ports:
  - name: http
    port: 80
    targetPort: 80
  - name: https
    port: 443
    targetPort: 443
---
apiVersion: v1
kind: Service
metadata:
  name: gitlab-ssh-service
  namespace: gitlab
spec:
  selector:
    app: gitlab
  type: LoadBalancer
  ports:
  - name: ssh
    port: 22
    targetPort: 22